<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Website{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* ===== HEADER ===== */
        header {
            background-color: #4e73df;
            color: white;
            padding: 15px 0;
        }

        .nav-container {
            width: 90%;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin-left: 20px;
            font-weight: 500;
        }

        nav a:hover {
            color: #1cc88a;
        }

        /* ===== FOOTER ===== */
        footer {
            background-color: #2e2e2e;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="nav-container">
            <div class="logo">Doctor appointment</div>
            <nav>
                <a href="#">Home</a>
                <a href="{% url 'doctor' %}">Doctor</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

   
    <div>
        {% block content %}
        {% endblock %}
    </div>

    
    <footer>
        <p>gmail:paraschandrawanshi649@gmail.com</p>
    </footer>

</body>
</html>
