 {% extends "Base.html" %}

 {% block content %}
 <form method="post">
    {% csrf_token %}

    <div style="color:red;">
        {{ form.non_field_errors }}
    </div>

   
    <label>Email:</label>
    {{ form.email }}
    <br>

    <label>Password:</label>
    {{ form.password }}
    <br>

    <button type="submit">Submit</button>
    <button><a href={% url 'forget_password'  %}>forget_password</a></button>
</form>
 {% endblock content %}
